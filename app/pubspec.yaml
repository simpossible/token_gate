name: token_gate_app
description: "Token Gate desktop app — manages Claude API keys and monitors token usage."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  tray_manager: ^0.2.3
  window_manager: ^0.4.3
  http: ^1.2.0
  shared_preferences: ^2.3.0
  package_info_plus: ^8.0.0
  fl_chart: ^0.70.0
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bin/
    - assets/icons/
